spring.application.name=portfolio_server

# Load secrets (DB credentials, admin seed account, JWT key) from a git-ignored file.
spring.config.import=optional:application-secret.properties

# ===== MariaDB =====
# username/password live in application-secret.properties
spring.datasource.url=jdbc:mariadb://localhost:3308/portfolio-db
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ===== Reverse proxy (Nginx) =====
# Behind Nginx the app sees requests as http://localhost:8080. This makes Spring
# honor X-Forwarded-* headers so absolute URLs (e.g. uploaded image URLs built by
# ServletUriComponentsBuilder) use the real public host/scheme, not localhost:8080.
server.forward-headers-strategy=framework

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.open-in-view=false

# ===== File upload (images) =====
app.upload.dir=uploads
app.upload.public-path=/uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== JWT (non-secret) =====
# app.jwt.secret and the admin seed credentials live in application-secret.properties
app.jwt.expiration-ms=3600000

# ===== CORS =====
# Comma-separated origins. Add your real domain (and its www variant) when you deploy.
app.cors.allowed-origins=http://localhost:3000,https://portfolio.example.com

# ===== Swagger / OpenAPI (springdoc) =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs